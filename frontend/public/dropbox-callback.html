<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dropbox - Autenticação</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #0061ff 0%, #0051d5 100%);
      color: white;
    }
    .container {
      text-align: center;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h2>Conectando ao Dropbox...</h2>
    <p>Aguarde enquanto finalizamos a autenticação.</p>
  </div>
  
  <script>
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const access_token = params.get('access_token');
    
    if (access_token && window.opener) {
      window.opener.postMessage({ access_token }, window.location.origin);
      setTimeout(() => {
        window.close();
      }, 500);
    } else {
      document.querySelector('.container').innerHTML = 
        '<h2>❌ Erro na autenticação</h2><p>Feche esta janela e tente novamente.</p>';
    }
  </script>
</body>
</html>
